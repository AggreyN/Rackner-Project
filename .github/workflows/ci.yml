name: CI

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/ci.yml"

jobs:
  frontend:
    name: Lint & build (frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm run build
